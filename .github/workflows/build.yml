name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller build.spec

      - name: Verify EXE exists
        run: |
          if (Test-Path "dist/ytb-summarizer.exe") {
            Write-Output "Build successful: dist/ytb-summarizer.exe"
            $size = (Get-Item "dist/ytb-summarizer.exe").length / 1MB
            Write-Output "Size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "Build failed: EXE not found"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytb-summarizer-windows-${{ github.ref_name }}
          path: dist/ytb-summarizer.exe
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ytb-summarizer.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
